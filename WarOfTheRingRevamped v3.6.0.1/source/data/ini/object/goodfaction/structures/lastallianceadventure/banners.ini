Object BannerStand
 
	SelectPortrait			= UPLABannerFoundation

	; *** ART Parameters ***

	Draw = W3DScriptedModelDraw ModuleTag_Draw
		OkToChangeModelColor  = Yes
		UseStandardModelNames = Yes
				
		DefaultModelConditionState
			Model = abLAfound_skn
		End
		
		ModelConditionState				= BUILD_PLACEMENT_CURSOR
			Shadow						= SHADOW_ALPHA_DECAL
			ShadowTexture				= decal_hero_good
			ShadowSizeX					= GONDOR_WELL_AOE_RADIUS_DECAL
			ShadowSizeY					= GONDOR_WELL_AOE_RADIUS_DECAL
		    ShadowOverrideLODVisibility = Yes
		End
		
		ModelConditionState = AWAITING_CONSTRUCTION 
			Model					= abLAfound_bld
		End
		
		ModelConditionState = SNOW ACTIVELY_BEING_CONSTRUCTED PARTIALLY_CONSTRUCTED
			Model	= abLAfound_bld		
			Texture = GUHeroStat.tga GUHeroStat_Snow.tga
		End  
		
		ModelConditionState     = ACTIVELY_BEING_CONSTRUCTED PARTIALLY_CONSTRUCTED
			Model               = abLAfound_bld
;			ParticleSysBone	    = NONE BuildingDoughnutCloud
			ParticleSysBone     = NONE BuildingContructDust
		End  
		AnimationState          = ACTIVELY_BEING_CONSTRUCTED
			Animation
				AnimationName	= abLAfound_bld.abLAfound_bld
				AnimationMode   = MANUAL
			End
			BeginScript
				CurDrawablePlaySound("GondorBarracksBeginConstruction")
			EndScript
		End

		ModelConditionState     = DAMAGED
			Model               = GPHealstue_D1
		End  
		AnimationState = DAMAGED
			EnteringStateFX	= FX_StatueDamaged
		End

		ModelConditionState     = REALLYDAMAGED
			Model               = GPHealstue_D2
		End  
		AnimationState = REALLYDAMAGED
			EnteringStateFX	= FX_StatueDamaged
			Animation				=	RubbleAnimation
				AnimationName		=	GPHealstue_D2.GPHealstue_D2
				AnimationMode		=	ONCE
  			End
		End

		ModelConditionState  = RUBBLE
			Model         = GPHealstue_D3
			ParticleSysBone SmokeLarge01 SmokeBuildingLarge
		End
	    AnimationState = RUBBLE
	    	Animation				=	RubbleAnimation
				AnimationName		=	GPHealstue_D3.GPHealstue_D3
				AnimationMode		=	ONCE
  			End
		End

		ModelConditionState  = POST_RUBBLE
			Model         = None
			ParticleSysBone NONE SmokeBuildingMediumRubble
		End

		ModelConditionState  = POST_COLLAPSE
			Model         = None
			ParticleSysBone NONE SmokeBuildingMediumRubble
		End
			
   	End

	PlacementViewAngle		= 270
 
	; ***DESIGN parameters ***
	DisplayName			= OBJECT:GondorBuildingFoundation
	Side				= LastAlliance
	EditorSorting			= STRUCTURE
	ThreatLevel			= 1.0

	BuildCost           = 300
	BuildTime           = 15
	VisionRange         = GONDOR_STATUE_VISION_RANGE
	ShroudClearingRange = GONDOR_STATUE_SHROUD_CLEAR

	CommandSet			= LastAllianceBannerFoundationCommandSet


	; *** AUDIO Parameters ***

	VoiceSelect			= Gui_PlotSelect2	; Gui_PlotSelect
	VoiceFullyCreated	= EVA:LastAllianceBannerFoundationComplete-Builder

	; *** ENGINEERING Parameters ***

	RadarPriority			= STRUCTURE
	;KindOf = STRUCTURE SELECTABLE IMMOBILE BASE_FOUNDATION UNATTACKABLE MP_COUNT_FOR_VICTORY NO_COLLIDE DO_NOT_CLASSIFY
	KindOf = STRUCTURE SELECTABLE IMMOBILE BASE_FOUNDATION UNATTACKABLE MP_COUNT_FOR_VICTORY NO_COLLIDE DO_NOT_CLASSIFY EXPANSION_PAD NOT_AUTOACQUIRABLE
 
	Behavior = FoundationAIUpdate ModuleTag_foundationAI
	End

	Behavior = CastleMemberBehavior ModuleTag_CMB
	End
	
 	Behavior = AIUpdateInterface ModuleTag_AIUpdate
		AILuaEventsList				= UniversalBuildplotFunctions
 	End


	Body                	= StructureBody ModuleTag_05
		MaxHealth         		= 2000
		MaxHealthDamaged  		= 1333
		MaxHealthReallyDamaged 		= 666
	End
	
	ArmorSet
		Conditions = None
		Armor	   = InvulnerableArmor
		DamageFX   = NormalDamageFX
	End	
	
	Behavior = LifetimeUpdate ModuleTag_LifetimeUpdate		
		MinLifetime		= 120000
		MaxLifetime		= 120000
		DeathType		= FADED
	End
 
 	Behavior = SlowDeathBehavior ModuleTag_FadeDeath
		DeathTypes = ALL
		FadeDelay = 0
		FadeTime = 5000
		DestructionDelay = 5000
	End
 
	Geometry			= BOX
	GeometryMajorRadius		= 24.0
	GeometryMinorRadius		= 24.0
	GeometryHeight			= 0.8
	GeometryIsSmall			= No
	Shadow				= SHADOW_VOLUME
	BuildCompletion			= PLACED_BY_PLAYER
End

