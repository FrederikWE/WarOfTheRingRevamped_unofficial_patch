			End
			BeginScript
				CurDrawablePlaySound("GondorBarracksBeginConstruction")
				CurDrawablePlaySound("BuildingTopple")
			EndScript
		End

		ModelConditionState		= JUST_BUILT
			Model				= abLAcomtent_bld
		End
