        RankInfo = RankNumber:1 UnitType:HaradBlackNumenoreanSpearmen Position:X:34 Y:0            Position:X:34 Y:10                Position:X:34 Y:-10                Position:X:34 Y:20                Position:X:34 Y:-20 GrantedWeaponCondition:WEAPONSET_TOGGLE_1
