		RankInfo = RankNumber:1 UnitType:HaradBlackNumenoreanSpearmen Position:X:50 Y:0		Position:X:50 Y:20		Position:X:50 Y:-20		Position:X:50 Y:40		Position:X:50 Y:-40 
		RankInfo = RankNumber:2 UnitType:HaradBlackNumenoreanSpearmen Position:X:30 Y:0 Leader 1 0	Position:X:30 Y:20 Leader 1 1	Position:X:30 Y:-20 Leader 1 2	Position:X:30 Y:40 Leader 1 3	Position:X:30 Y:-40 Leader 1 4
		
		;;ComboHorde = Target:MordorHaradrimArcherHorde Result:MordorEasterlingHaradrimArcherComboHorde ; InitiateVoice:OrcFighterVoiceJoinArcher
		;ComboHorde = Target:MordorEasterlingArcherHorde Result:MordorEasterlingEasterlingArcherComboHorde ;
		;ComboHorde = Target:MordorEasterlingSwordsmanHorde Result:MordorEasterlingEasterlingArcherComboHorde3 ;

