		MinimumHordeSize		= 5

		AlternateFormation		= HaradBlackNumenoreanSpearmenHorde
		VisionRearOverride		= 100%
		VisionSideOverride		= 100%
		NotComboFormation		= Yes // this formation is not suitable for combo, so it will switch out of this when combo-ing

		// Banner Carrier info		
		BannerCarriersAllowed		= HaradBlackNumenoreanWarriorBanner												// types of units that are allowed as banner carriers
